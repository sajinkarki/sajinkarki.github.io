<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Clock — Tulnest</title>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --text: #e8e6e0;
      --muted: #666;
      --accent: #c8f135;
      --accent2: #f13568;
      --font-display: 'Unbounded', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.3;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
    }

    /* NAV */
    .nav {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2rem;
      background: rgba(13,13,13,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }

    .nav-logo {
      font-family: var(--font-display);
      font-size: 0.85rem;
      font-weight: 900;
      color: var(--accent);
      letter-spacing: -0.03em;
    }

    .nav-back {
      font-size: 0.75rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--accent); }

    /* MAIN WRAPPER */
    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
      position: relative;
      z-index: 1;
    }

    /* CLOCK CONTAINER */
    .clock-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Glow effect */
    .clock-glow {
      position: absolute;
      width: 320px; height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200,241,53,0.08), transparent 70%);
      pointer-events: none;
    }

    /* Clock SVG */
    #clockSVG {
      width: 300px; height: 300px;
      filter: drop-shadow(0 0 20px rgba(200,241,53,0.1));
    }

    /* Clock face */
    .clock-face {
      fill: var(--surface);
      stroke: var(--border);
      stroke-width: 2;
    }

    .clock-face-inner {
      fill: none;
      stroke: rgba(200,241,53,0.08);
      stroke-width: 1;
    }

    /* Hour markers */
    .hour-marker {
      stroke: var(--text);
      stroke-width: 2;
      stroke-linecap: round;
    }

    .minute-marker {
      stroke: var(--border);
      stroke-width: 1;
      stroke-linecap: round;
    }

    /* Hands */
    .hand-hour {
      stroke: var(--text);
      stroke-width: 4;
      stroke-linecap: round;
      transform-origin: 150px 150px;
      transition: transform 0.5s cubic-bezier(0.4, 2.08, 0.55, 0.44);
    }

    .hand-minute {
      stroke: var(--text);
      stroke-width: 3;
      stroke-linecap: round;
      transform-origin: 150px 150px;
      transition: transform 0.5s cubic-bezier(0.4, 2.08, 0.55, 0.44);
    }

    .hand-second {
      stroke: var(--accent);
      stroke-width: 1.5;
      stroke-linecap: round;
      transform-origin: 150px 150px;
      transition: transform 0.1s linear;
    }

    /* Center dot */
    .center-dot {
      fill: var(--accent);
    }

    .center-dot-inner {
      fill: var(--bg);
    }

    /* DIGITAL DISPLAY */
    .digital-display {
      text-align: center;
    }

    .digital-time {
      font-family: var(--font-display);
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .digital-time span { color: var(--accent); }

    .digital-date {
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }

    .digital-timezone {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    /* SYNC STATUS */
    .sync-status {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.72rem;
      color: var(--muted);
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
    }

    .sync-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
    }

    .sync-dot.synced { background: var(--accent); animation: pulse 2s infinite; }
    .sync-dot.syncing { background: #f59e0b; animation: pulse 0.5s infinite; }
    .sync-dot.error { background: var(--accent2); }

    /* TIMEZONE SELECTOR */
    .timezone-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8rem;
    }

    .timezone-label {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .timezone-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      padding: 0.5rem 1rem;
      cursor: pointer;
      transition: border-color 0.2s;
      appearance: none;
      text-align: center;
    }
    .timezone-select:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* WORLD CLOCKS */
    .world-clocks {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .world-clock {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.8rem 1.2rem;
      text-align: center;
      min-width: 100px;
      transition: border-color 0.2s;
    }
    .world-clock:hover { border-color: var(--accent); }

    .world-clock-city {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.3rem;
    }

    .world-clock-time {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .world-clock-time.accent { color: var(--accent); }

    /* FOOTER */
    .footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 0.8rem 2rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.7rem;
      color: var(--muted);
      background: rgba(13,13,13,0.9);
      backdrop-filter: blur(12px);
    }

    .footer a { color: var(--accent); text-decoration: none; }

    /* ANIMATIONS */
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .wrapper > * {
      animation: fadeUp 0.6s ease both;
    }
    .wrapper > *:nth-child(1) { animation-delay: 0.1s; }
    .wrapper > *:nth-child(2) { animation-delay: 0.2s; }
    .wrapper > *:nth-child(3) { animation-delay: 0.3s; }
    .wrapper > *:nth-child(4) { animation-delay: 0.4s; }
    .wrapper > *:nth-child(5) { animation-delay: 0.5s; }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      #clockSVG { width: 240px; height: 240px; }
      .clock-glow { width: 260px; height: 260px; }
      .hand-hour { transform-origin: 120px 120px; }
      .hand-minute { transform-origin: 120px 120px; }
      .hand-second { transform-origin: 120px 120px; }
      .world-clocks { gap: 0.6rem; }
      .world-clock { min-width: 80px; padding: 0.6rem 0.8rem; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <div class="nav-logo">⚡ Tulnest</div>
    <a href="../../" class="nav-back">← Back to Tulnest</a>
  </nav>

  <!-- MAIN -->
  <div class="wrapper">

    <!-- ANALOG CLOCK -->
    <div class="clock-wrap">
      <div class="clock-glow"></div>
      <svg id="clockSVG" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">

        <!-- Outer ring -->
        <circle cx="150" cy="150" r="145" class="clock-face"/>

        <!-- Inner decorative rings -->
        <circle cx="150" cy="150" r="130" class="clock-face-inner"/>
        <circle cx="150" cy="150" r="110" class="clock-face-inner" opacity="0.5"/>

        <!-- Minute markers -->
        <g id="minuteMarkers"></g>

        <!-- Hour markers -->
        <g id="hourMarkers"></g>

        <!-- Hour numbers -->
        <g id="hourNumbers"></g>

        <!-- Hands -->
        <line id="hourHand" x1="150" y1="150" x2="150" y2="80" class="hand-hour"/>
        <line id="minuteHand" x1="150" y1="150" x2="150" y2="60" class="hand-minute"/>
        <line id="secondHand" x1="150" y1="170" x2="150" y2="45" class="hand-second"/>

        <!-- Center -->
        <circle cx="150" cy="150" r="8" class="center-dot"/>
        <circle cx="150" cy="150" r="3" class="center-dot-inner"/>

      </svg>
    </div>

    <!-- DIGITAL DISPLAY -->
    <div class="digital-display">
      <div class="digital-time" id="digitalTime">
        00<span>:</span>00<span>:</span>00
      </div>
      <div class="digital-date" id="digitalDate">Loading...</div>
      <div class="digital-timezone" id="digitalTimezone">Syncing with time server...</div>
    </div>

    <!-- SYNC STATUS -->
    <div class="sync-status">
      <div class="sync-dot syncing" id="syncDot"></div>
      <span id="syncText">Syncing with worldtimeapi.org...</span>
    </div>

    <!-- TIMEZONE SELECTOR -->
    <div class="timezone-wrap">
      <div class="timezone-label">Select Timezone</div>
      <select class="timezone-select" id="timezoneSelect">
        <option value="Asia/Kathmandu">🇳🇵 Kathmandu (NPT)</option>
        <option value="UTC">🌐 UTC</option>
        <option value="America/New_York">🇺🇸 New York (EST)</option>
        <option value="Europe/London">🇬🇧 London (GMT)</option>
        <option value="Asia/Tokyo">🇯🇵 Tokyo (JST)</option>
        <option value="Asia/Dubai">🇦🇪 Dubai (GST)</option>
        <option value="Asia/Kolkata">🇮🇳 India (IST)</option>
        <option value="Australia/Sydney">🇦🇺 Sydney (AEST)</option>
      </select>
    </div>

    <!-- WORLD CLOCKS -->
    <div class="world-clocks">
      <div class="world-clock">
        <div class="world-clock-city">Kathmandu</div>
        <div class="world-clock-time accent" id="wc-kathmandu">--:--</div>
      </div>
      <div class="world-clock">
        <div class="world-clock-city">London</div>
        <div class="world-clock-time" id="wc-london">--:--</div>
      </div>
      <div class="world-clock">
        <div class="world-clock-city">New York</div>
        <div class="world-clock-time" id="wc-newyork">--:--</div>
      </div>
      <div class="world-clock">
        <div class="world-clock-city">Tokyo</div>
        <div class="world-clock-time" id="wc-tokyo">--:--</div>
      </div>
      <div class="world-clock">
        <div class="world-clock-city">Dubai</div>
        <div class="world-clock-time" id="wc-dubai">--:--</div>
      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <span>Live Clock — <a href="../../">Tulnest</a></span>
    <span>Synced with <a href="https://worldtimeapi.org" target="_blank">worldtimeapi.org</a></span>
    <a href="https://github.com/sajinkarki/tulnest" target="_blank">Source ↗</a>
  </footer>

  <script>
    // ── Draw clock markers ──
    const svg = document.getElementById('clockSVG');
    const cx = 150, cy = 150, r = 145;

    // Minute markers
    const minuteGroup = document.getElementById('minuteMarkers');
    for (let i = 0; i < 60; i++) {
      const angle = (i * 6 - 90) * Math.PI / 180;
      const isHour = i % 5 === 0;
      const inner = isHour ? 118 : 128;
      const outer = 138;
      const x1 = cx + inner * Math.cos(angle);
      const y1 = cy + inner * Math.sin(angle);
      const x2 = cx + outer * Math.cos(angle);
      const y2 = cy + outer * Math.sin(angle);
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', x1); line.setAttribute('y1', y1);
      line.setAttribute('x2', x2); line.setAttribute('y2', y2);
      line.setAttribute('class', isHour ? 'hour-marker' : 'minute-marker');
      minuteGroup.appendChild(line);
    }

    // Hour numbers
    const numGroup = document.getElementById('hourNumbers');
    for (let i = 1; i <= 12; i++) {
      const angle = (i * 30 - 90) * Math.PI / 180;
      const nr = 100;
      const x = cx + nr * Math.cos(angle);
      const y = cy + nr * Math.sin(angle);
      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', x);
      text.setAttribute('y', y);
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('dominant-baseline', 'central');
      text.setAttribute('fill', '#e8e6e0');
      text.setAttribute('font-size', '14');
      text.setAttribute('font-family', 'Unbounded, sans-serif');
      text.setAttribute('font-weight', '700');
      text.textContent = i;
      numGroup.appendChild(text);
    }

    // ── Time state ──
    let serverOffset = 0; // ms difference between server and local
    let selectedTimezone = 'Asia/Kathmandu';
    let synced = false;

    // ── Fetch time from worldtimeapi.org ──
    async function syncTime() {
      try {
        const res = await fetch(`https://worldtimeapi.org/api/timezone/${selectedTimezone}`);
        const data = await res.json();
        const serverTime = new Date(data.datetime);
        const localTime = new Date();
        serverOffset = serverTime - localTime;
        synced = true;

        // Update sync status
        document.getElementById('syncDot').className = 'sync-dot synced';
        document.getElementById('syncText').textContent =
          `Synced with worldtimeapi.org — offset: ${serverOffset > 0 ? '+' : ''}${Math.round(serverOffset/1000)}s`;

      } catch (err) {
        synced = false;
        document.getElementById('syncDot').className = 'sync-dot error';
        document.getElementById('syncText').textContent =
          'Using device time — could not reach time server';
      }
    }

    // ── Get current time (server-corrected) ──
    function getCurrentTime() {
      return new Date(Date.now() + serverOffset);
    }

    // ── Get time in specific timezone ──
    function getTimeInZone(timezone) {
      return new Date().toLocaleTimeString('en-US', {
        timeZone: timezone,
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      });
    }

    // ── Rotate clock hand ──
    function rotateHand(id, degrees) {
      document.getElementById(id).setAttribute('transform',
        `rotate(${degrees}, 150, 150)`);
    }

    // ── Update clock ──
    function updateClock() {
      const now = getCurrentTime();

      // Get time in selected timezone
      const timeStr = now.toLocaleTimeString('en-US', {
        timeZone: selectedTimezone,
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
      });

      const [h, m, s] = timeStr.split(':').map(Number);
      const ms = now.getMilliseconds();

      // Smooth hand angles
      const secondDeg = s * 6 + ms * 0.006;
      const minuteDeg = m * 6 + s * 0.1;
      const hourDeg = (h % 12) * 30 + m * 0.5;

      rotateHand('hourHand', hourDeg);
      rotateHand('minuteHand', minuteDeg);
      rotateHand('secondHand', secondDeg);

      // Digital display
      const hh = String(h).padStart(2, '0');
      const mm = String(m).padStart(2, '0');
      const ss = String(s).padStart(2, '0');
      document.getElementById('digitalTime').innerHTML =
        `${hh}<span>:</span>${mm}<span>:</span>${ss}`;

      // Date
      const dateStr = now.toLocaleDateString('en-US', {
        timeZone: selectedTimezone,
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });
      document.getElementById('digitalDate').textContent = dateStr;

      // Timezone
      document.getElementById('digitalTimezone').textContent =
        `Timezone: ${selectedTimezone}`;

      // World clocks
      document.getElementById('wc-kathmandu').textContent =
        getTimeInZone('Asia/Kathmandu');
      document.getElementById('wc-london').textContent =
        getTimeInZone('Europe/London');
      document.getElementById('wc-newyork').textContent =
        getTimeInZone('America/New_York');
      document.getElementById('wc-tokyo').textContent =
        getTimeInZone('Asia/Tokyo');
      document.getElementById('wc-dubai').textContent =
        getTimeInZone('Asia/Dubai');
    }

    // ── Timezone selector ──
    document.getElementById('timezoneSelect').addEventListener('change', (e) => {
      selectedTimezone = e.target.value;
      document.getElementById('syncDot').className = 'sync-dot syncing';
      document.getElementById('syncText').textContent = 'Syncing...';
      syncTime();
    });

    // ── Init ──
    syncTime();
    setInterval(updateClock, 100);
    setInterval(syncTime, 5 * 60 * 1000); // re-sync every 5 minutes
    updateClock();
  </script>
</body>
</html>
